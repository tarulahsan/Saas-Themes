    <!-- Template-Specific Metadata - To be dynamically updated by JS in each final template -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {

            const pageTitle = "TalkBot - Your Friendly AI Chat Assistant | 24/7 Support";
            const pageDescription = "Meet TalkBot, the AI chat assistant that makes customer interactions delightful and efficient. Provide instant answers, guide users, and boost engagement.";
            const pageSlug = "talkbot";
            const ogImage = "assets/ai-og-talkbot-v2-default.jpg";
            const schemaType = "Service";
            const productName = "TalkBot";

            document.title = pageTitle;
            document.querySelector('meta[name="description"]').setAttribute("content", pageDescription);
            document.querySelector('link[rel="canonical"]').setAttribute("href", `https://example.com/${pageSlug}`);

            document.querySelector('meta[property="og:title"]').setAttribute("content", pageTitle);
            document.querySelector('meta[property="og:description"]').setAttribute("content", pageDescription);
            document.querySelector('meta[property="og:image"]').setAttribute("content", ogImage);
            document.querySelector('meta[property="og:url"]').setAttribute("content", `https://example.com/${pageSlug}`);

            document.querySelector('meta[name="twitter:title"]').setAttribute("content", pageTitle);
            document.querySelector('meta[name="twitter:description"]').setAttribute("content", pageDescription);
            document.querySelector('meta[name="twitter:image"]').setAttribute("content", ogImage);

            const schema = {
              "@context": "https://schema.org",
              "@type": schemaType,
              "name": productName,
              "description": pageDescription,
              "url": `https://example.com/${pageSlug}`,
              "image": ogImage,
            };
            if (schemaType === 'SoftwareApplication') {
                schema.applicationCategory = 'MultimediaApplication';
                schema.operatingSystem = 'Web';
            }

            let oldSchemaScript = document.querySelector('script[type="application/ld+json"]');
            if (oldSchemaScript && oldSchemaScript.parentElement === document.head) {
                 oldSchemaScript.remove();
            }
            const schemaScriptTag = document.createElement('script');
            schemaScriptTag.type = 'application/ld+json';
            schemaScriptTag.text = JSON.stringify(schema, null, 2);
            document.head.appendChild(schemaScriptTag);

            const currentYear = new Date().getFullYear();
            if(document.getElementById('currentYearPlaceholder')) {
                document.getElementById('currentYearPlaceholder').textContent = currentYear;
            }
            if(document.getElementById('productNamePlaceholder')) {
                document.getElementById('productNamePlaceholder').textContent = productName;
            }
            if(document.getElementById('productNameFooterPlaceholder')) {
                document.getElementById('productNameFooterPlaceholder').textContent = productName;
            }
        });
    </script>
